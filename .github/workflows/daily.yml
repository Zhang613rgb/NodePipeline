name: Daily Node Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 阶段1 — 爬取+合并节点
        run: python node_downloader.py
        timeout-minutes: 15

      - name: 下载 mihomo 内核
        run: |
          LATEST=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" \
            | python -c "import sys,json;d=json.load(sys.stdin); print(next(a['browser_download_url'] for a in d['assets'] if 'linux-amd64-compatible' in a['name'] and a['name'].endswith('.gz')))" 2>/dev/null)
          echo "下载: $LATEST"
          curl -sL -o clash.gz "$LATEST"
          gunzip -c clash.gz > clash
          chmod +x clash
          ./clash -v

      - name: 阶段2 — mihomo 测速 + 排序
        run: python bridge.py --no-download
        timeout-minutes: 10

      - name: 提交 box.txt 到仓库
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add box.txt
          git diff --cached --quiet || git commit -m "update"
          git push
