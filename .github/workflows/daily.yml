name: Daily Node Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 阶段1 — 爬取+合并节点
        run: python node_downloader.py
        timeout-minutes: 15

      - name: 阶段2 — 输出 box.txt（全部节点）
        run: python bridge.py --skip-test
        timeout-minutes: 5

      - name: 提交 box.txt 到仓库
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add box.txt
          git diff --cached --quiet || (git commit -m "update" && git push -f)
